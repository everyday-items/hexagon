# Hexagon 开发基础设施
#
# 提供本地开发所需的基础设施服务（向量数据库、缓存、关系数据库）。
#
# 使用方式:
#
#   # 启动全部基础设施
#   docker compose up -d
#
#   # 按需启动
#   docker compose up -d qdrant redis
#
#   # 查看日志
#   docker compose logs -f
#
#   # 停止并清理
#   docker compose down
#   docker compose down -v   # 同时删除数据卷
#
# 环境变量:
#   cp .env.example .env

services:
  # ============== 基础设施 ==============

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: hexagon-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - hexagon-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis/redis-stack:7.4.0-v0
    container_name: hexagon-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-}
    networks:
      - hexagon-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: hexagon-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hexagon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hexagon}
      - POSTGRES_DB=${POSTGRES_DB:-hexagon}
    networks:
      - hexagon-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hexagon}"]
      interval: 10s
      timeout: 5s
      retries: 3

# ============== 网络 ==============

networks:
  hexagon-net:
    driver: bridge

# ============== 数据卷 ==============

volumes:
  qdrant-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
